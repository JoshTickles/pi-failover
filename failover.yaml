# pi-failover configuration
# Place in: ./failover.yaml or ~/.config/pi-failover/failover.yaml

failover:
  # HTTP status codes that trigger failover to next backend
  trigger_codes: [429, 402, 500, 504, 529]
  # Also failover on connection errors (DNS, TCP, TLS failures)
  trigger_on_connection_error: true
  # Seconds to skip a failed backend before retrying it
  cooldown_seconds: 300
  # Max backends to try per request
  max_retries: 3

notify:
  enabled: true
  desktop: true  # macOS desktop notification on failover

# Backends tried in order — first healthy one wins
backends:
  - name: "anthropic-primary"
    enabled: true
    type: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"

  - name: "anthropic-backup"
    enabled: false
    type: "anthropic"
    api_key_env: "ANTHROPIC_BACKUP_API_KEY"
    base_url: "https://api.anthropic.com"

  # Example: different region / account
  # - name: "anthropic-eu"
  #   enabled: false
  #   type: "anthropic"
  #   api_key_env: "ANTHROPIC_EU_API_KEY"
  #   base_url: "https://api.anthropic.com"
