# pi-failover configuration
# Place in: ./failover.yaml or ~/.config/pi-failover/failover.yaml

failover:
  trigger_codes: [429, 402, 500, 504, 529]
  trigger_on_connection_error: true
  cooldown_seconds: 300
  max_retries: 3

notify:
  enabled: true
  desktop: true

# ──────────────────────────────────────────────────────────────────
# Automatic model swap chain (Mechanism 2 — fully automatic)
#
# When ANY active model errors with a retriable error (429, 529, etc.),
# pi-failover swaps to the next model in this list and retries the prompt.
# Works with autoresearch, -p mode, interactive — anything.
#
# List models in priority order. Uses whatever providers Pi already has
# configured (anthropic, amazon-bedrock, google-vertex, etc.).
# ──────────────────────────────────────────────────────────────────
fallback_models:
  - provider: "amazon-bedrock"
    model: "global.anthropic.claude-sonnet-4-6"

  # - provider: "anthropic"
  #   model: "claude-sonnet-4-6"

  # - provider: "google-vertex"
  #   model: "claude-sonnet-4-6"

# ──────────────────────────────────────────────────────────────────
# Multi-backend failover provider (Mechanism 1 — requires /model selection)
#
# Registers a "failover" provider that tries multiple Anthropic API
# endpoints in sequence. Use /model → failover/claude-sonnet-4-6.
# Useful when you have multiple API keys or endpoints.
# ──────────────────────────────────────────────────────────────────
backends:
  - name: "anthropic-primary"
    enabled: true
    type: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"

  # - name: "anthropic-backup"
  #   enabled: false
  #   type: "anthropic"
  #   api_key_env: "ANTHROPIC_BACKUP_API_KEY"
  #   base_url: "https://api.anthropic.com"
